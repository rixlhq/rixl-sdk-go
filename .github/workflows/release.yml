name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    uses: rixlhq/github-actions/.github/workflows/release.yml@v1.9.5
    with:
      config-file: release-please-config.json
      manifest-file: .release-please-manifest.json
    secrets: inherit
