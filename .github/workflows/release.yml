name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Prepend install snippet to release notes
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          body=$(gh release view "$TAG" --repo ${{ github.repository }} --json body --jq .body)
          {
            printf '## Install\n\n```bash\ngo get github.com/rixlhq/rixl-go@v%s\n```\n\n' "$VERSION"
            printf '%s' "$body"
          } > /tmp/notes.md
          gh release edit "$TAG" --repo ${{ github.repository }} --notes-file /tmp/notes.md

  pkggodev:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
      - name: Warm pkg.go.dev
        run: |
          tag='${{ needs.release-please.outputs.tag_name }}'
          # Use go list -m to properly notify the proxy
          GOPROXY=proxy.golang.org go list -m github.com/rixlhq/rixl-go@${tag}
