        content:
          application/json:
            schema:
              $ref: "#/components/schemas/github_com_qeeqez_api_internal_videos_handler_upload.CompleteRequest"
        description: Video upload completion request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_qeeqez_api_internal_errors.ErrorResponse"
          description: Invalid request body
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_qeeqez_api_internal_errors.ErrorResponse"
          description: Unauthorized - Invalid API key
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_qeeqez_api_internal_errors.ErrorResponse"
          description: Access denied
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_qeeqez_api_internal_errors.ErrorResponse"
          description: File not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_qeeqez_api_internal_errors.ErrorResponse"
          description: Failed to complete upload
      security:
      - ApiKeyAuth: []
      summary: "Upload: Mark as complete"
      tags:
      - videos
      x-order: 4
      x-codegen-request-body-name: request
  /videos/upload/init:
